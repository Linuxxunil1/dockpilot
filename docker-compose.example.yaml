services:
  dockpilot:
    image: ghcr.io/linuxxunil1/dockpilot:latest
    container_name: dockpilot
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DASH_USER=admin                           # Benutzername
      - DASH_PASSWORD=changeme                    # ← Sicheres Passwort setzen!
      - DASH_SECRET=changeme                      # ← Zufallswert: openssl rand -hex 32
      - STACKS_DIR=/opt/dockpilot/stacks
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/dockpilot/stacks:/opt/dockpilot/stacks
      - /opt/dockpilot/data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockpilot.rule=Host(`dockpilot.example.com`)"  # ← Domain anpassen
      - "traefik.http.routers.dockpilot.entrypoints=websecure"
      - "traefik.http.routers.dockpilot.tls=true"
      - "traefik.http.routers.dockpilot.tls.certresolver=letsencrypt"        # ← Cert-Resolver anpassen
      - "traefik.http.routers.dockpilot.service=dockpilot"
      - "traefik.http.services.dockpilot.loadbalancer.server.port=8080"
      # Optional – mTLS aktivieren:
      # - "traefik.http.routers.dockpilot.tls.options=mtls@file"

volumes: {}

networks:
  proxy:
    external: true
    name: proxy   # ← Name des Traefik-Netzwerks anpassen
